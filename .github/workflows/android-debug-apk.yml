name: Android Debug APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-android-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: prajna-buddy/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        working-directory: prajna-buddy
        run: npm ci

      - name: Build web
        working-directory: prajna-buddy
        run: npm run build

      - name: Capacitor sync android
        working-directory: prajna-buddy
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: prajna-buddy/android
        run: chmod +x ./gradlew

      - name: Prepare signing keystore
        working-directory: prajna-buddy/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > prajna-buddy-release.jks
          cat > keystore.properties <<'EOF'
          storeFile=prajna-buddy-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build Release APK
        working-directory: prajna-buddy/android
        run: ./gradlew assembleRelease

      - name: Rename APK
        working-directory: prajna-buddy/android
        run: |
          APK_DIR="app/build/outputs/apk/release"
          if [ -f "$APK_DIR/Prajna-Reader.apk" ]; then
            echo "APK already named Prajna-Reader.apk"
            ls -lah "$APK_DIR/Prajna-Reader.apk"
            exit 0
          fi

          SRC_APK=$(ls -1 "$APK_DIR"/*.apk 2>/dev/null | head -n 1)
          if [ -z "$SRC_APK" ]; then
            echo "No APK found in $APK_DIR"
            ls -lah "$APK_DIR" || true
            exit 1
          fi

          echo "Renaming APK: $SRC_APK -> $APK_DIR/Prajna-Reader.apk"
          cp "$SRC_APK" "$APK_DIR/Prajna-Reader.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Prajna-Reader-apk
          path: prajna-buddy/android/app/build/outputs/apk/release/Prajna-Reader.apk
          if-no-files-found: error
