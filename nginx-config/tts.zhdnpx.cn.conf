# TTS API服务器配置
# 域名: tts.zhdnpx.cn
# 反向代理到Docker容器: prajna-tts-server

# 日志格式定义（可选，用于详细日志）
log_format tts_log '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'rt=$request_time uct="$upstream_connect_time" '
                   'uht="$upstream_header_time" urt="$upstream_response_time"';

# 上游服务器配置
upstream tts_backend {
    # 使用Docker容器名称（在web网络中）
    server prajna-tts-server:8000;
    
    # 保持连接以提高性能
    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 100;
}

# HTTP服务器 - 重定向到HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tts.zhdnpx.cn;

    # 日志配置
    # 方式1: 输出到标准输出（推荐用于Docker）
    access_log /dev/stdout;
    error_log /dev/stderr notice;
    
    # 方式2: 输出到文件（如果nginx容器挂载了日志目录）
    # 需要在docker run时添加: -v /opt/nginx/logs:/var/log/nginx
    # access_log /var/log/nginx/tts.zhdnpx.cn.http.access.log;
    # error_log /var/log/nginx/tts.zhdnpx.cn.http.error.log;

    # 重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS服务器
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tts.zhdnpx.cn;

    # SSL证书配置
    ssl_certificate /certs/fullchain.pem;
    ssl_certificate_key /certs/privkey.pem;
    
    # SSL优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # HSTS (可选，建议启用)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 日志配置
    # 方式1: 输出到标准输出（推荐用于Docker，使用docker logs查看）
    access_log /dev/stdout tts_log;
    error_log /dev/stderr warn;
    
    # 方式2: 输出到文件（如果需要持久化日志和分析）
    # 需要在docker run时添加: -v /opt/nginx/logs:/var/log/nginx
    # access_log /var/log/nginx/tts.zhdnpx.cn.access.log tts_log;
    # error_log /var/log/nginx/tts.zhdnpx.cn.error.log warn;

    # 客户端请求体大小限制（用于文本转语音）
    client_max_body_size 10M;

    # CORS配置 - 允许跨域访问
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, HEAD, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Range, Authorization' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range, Content-Type' always;
    add_header 'Access-Control-Max-Age' '1728000' always;

    # 健康检查端点（不记录日志）
    location = /health {
        proxy_pass http://tts_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # API文档
    location ~ ^/(docs|openapi\.json|redoc) {
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        proxy_pass http://tts_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # TTS音频生成接口（主要接口）
    location /tts/ {
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        proxy_pass http://tts_backend;
        proxy_http_version 1.1;
        
        # 代理头部
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 超时设置（音频生成可能需要较长时间）
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置（对于流式响应，关闭缓冲）
        proxy_buffering off;
        proxy_request_buffering off;
        
        # 支持Range请求（用于音频流式播放）
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
    }

    # sections相关接口
    location ~ ^/(sections?|section/) {
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        proxy_pass http://tts_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 较短的超时（这些是快速查询接口）
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # voices接口
    location /voices {
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        proxy_pass http://tts_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 缓存配置（voices信息很少变化）
        proxy_cache_valid 200 1h;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # 静态资源（如果有）
    # 静态资源（如果有）
    location /static/ {
        root /usr/share/nginx/prajna;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 根路径 - App介绍和下载页面（放在最后，作为默认处理）
    location / {
        root /usr/share/nginx/prajna;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 安全配置 - 隐藏隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
