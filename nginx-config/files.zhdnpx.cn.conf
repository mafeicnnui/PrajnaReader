# Nginx配置文件 - 文件服务器
# 域名: files.zhdnpx.cn
# 用途: 提供经典音频文件的静态文件服务

server {
    listen 80;
    listen [::]:80;
    server_name files.zhdnpx.cn;

    # HTTP重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name files.zhdnpx.cn;

    # SSL证书配置
    ssl_certificate /certs/files.zhdnpx.cn.crt;
    ssl_certificate_key /certs/files.zhdnpx.cn.key;
    
    # SSL优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 网站根目录 - 存放音频文件
    root /usr/share/nginx/files;

    # 默认索引文件
    index index.html index.htm;

    # 日志配置
    access_log /var/log/nginx/files.zhdnpx.cn.access.log;
    error_log /var/log/nginx/files.zhdnpx.cn.error.log;

    # CORS配置 - 允许跨域访问
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Range' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;

    # 处理OPTIONS预检请求
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Range';
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
    }

    # 音频文件缓存配置
    location ~* \.(mp3|wav|ogg|m4a|aac|flac)$ {
        # 启用Range请求支持（用于音频流式播放）
        add_header Accept-Ranges bytes;
        
        # 缓存配置
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Range' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range' always;
    }

    # 其他静态文件缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # 目录浏览（可选，根据需要启用）
    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        charset utf-8;
    }

    # 安全配置
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
}
